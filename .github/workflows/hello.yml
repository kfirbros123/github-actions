name: hello-actions

on:
  push:

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "Hello GitHub Actions"

  build:
    runs-on: ubuntu-latest
    needs: hello
    steps:
      - name: do build
        run: echo "building app"
  echo-env:
    runs-on: ubuntu-latest
    environment: production

    needs: build
    steps:
      - name: echo env
        run: echo $APP_ENV